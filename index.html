<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Todo app</title>
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="main">
      <section>
        <div class="main-title">
          <h1>TO DO</h1>
          <img
            src="./images/icon-sun.svg"
            alt="image pour illustration du soleil"
          />
        </div>
      </section>
      <section>
        <form id="todo-form">
          <div class="input-container">
            <span class="circle-decoration"></span>
            <input id="todo-input" type="text" placeholder="create a new todo">
          </div>
        </form>
      </section>
      <section class="todo-list-section">
        <ul id="todo-list">
          <li class="todo-item">
            <div class="todo-item-left">
              <span class="circle-decoration"></span>
              <p class="todo-text">Complite online JavaScript course</p>
            </div>
            <button class="delete-btn">
              <img src="./images/icon-cross.svg" alt="delete todo">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <!-- Todo -->

    <!-- Add dynamic number items left -->

    <!-- All
  Active 
  Completed

  Clear Completed

  Drag and drop to reorder list -->

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
    .
    <script src="./js/index.js"></script>
  </body>
</html>
